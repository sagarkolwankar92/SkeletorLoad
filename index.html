<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skeleton Loader Creator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>Skeleton Loader Creator</h1>
            <p>Turn image, SVG, or PDF layouts into animated skeleton placeholders.</p>
          </div>
          <div class="actions">
            <button class="button secondary" id="sampleButton" type="button" title="Load a built-in demo layout">Use demo</button>
            <button class="button" id="downloadButton" type="button">Download GIF</button>
          </div>
        </header>

        <div class="tool-grid">
          <aside class="panel controls">
            <label class="drop-zone" for="fileInput">
              <input id="fileInput" type="file" accept="image/*,.svg,.pdf,application/pdf,image/svg+xml">
              <span class="upload-icon" id="uploadIcon" aria-hidden="true">+</span>
              <strong>Upload image, SVG, or PDF</strong>
              <small>PNG, JPG, WebP, SVG, and single-page PDF previews work best.</small>
              <em id="uploadStatus">Ready for upload</em>
            </label>

            <div class="control-row">
              <label for="threshold">Shape sensitivity</label>
              <input id="threshold" type="range" min="12" max="90" value="42">
            </div>
            <div class="control-row">
              <label for="minArea">Minimum shape size</label>
              <input id="minArea" type="range" min="20" max="2400" value="180">
            </div>
            <div class="control-row">
              <label for="radius">Corner radius</label>
              <input id="radius" type="range" min="0" max="28" value="8">
            </div>
            <div class="control-row">
              <label for="density">Detail level</label>
              <input id="density" type="range" min="1" max="6" value="3">
            </div>

            <fieldset class="mode-group">
              <legend>Export as</legend>
              <label><input type="radio" name="exportMode" value="gif" checked> GIF</label>
              <label><input type="radio" name="exportMode" value="lottie"> Lottie</label>
            </fieldset>

            <div class="stats" aria-live="polite">
              <span><b id="shapeCount">0</b> shapes</span>
              <span id="fileName">No file loaded</span>
            </div>
          </aside>

          <section class="stage-panel">
            <div class="canvas-wrap">
              <canvas id="sourceCanvas" width="900" height="640"></canvas>
              <svg id="skeletonPreview" viewBox="0 0 900 640" role="img" aria-label="Generated skeleton preview"></svg>
            </div>
          </section>
        </div>
      </section>

      <section class="output-panel">
        <div class="output-header">
          <h2>Export output</h2>
          <button class="button secondary" id="copyButton" type="button">Copy</button>
        </div>
        <textarea id="outputCode" spellcheck="false"></textarea>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
